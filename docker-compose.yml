# YIMO Docker Compose - 一键启动配置
# 使用方法: docker compose up -d
# 停止服务: docker compose down
# 查看日志: docker compose logs -f

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: yimo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass123
      MYSQL_DATABASE: eav_db
      MYSQL_USER: eav_user
      MYSQL_PASSWORD: eavpass123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-local/bootstrap.sql:/docker-entrypoint-initdb.d/01-bootstrap.sql:ro
    ports:
      - "3307:3306"  # 映射到3307避免与本地MySQL冲突
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - yimo-network

  # YIMO Web 应用服务
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yimo-webapp
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: eav_db
      MYSQL_USER: eav_user
      MYSQL_PASSWORD: eavpass123
      TABLE_PREFIX: eav
      EMBED_MODEL: shibing624/text2vec-base-chinese
      MODEL_CACHE: /app/models
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      RAG_TOP_K: 5
    volumes:
      - model_cache:/app/models
      - ./outputs:/app/outputs
      - ./DATA:/app/DATA:ro
    ports:
      - "5000:5000"
    networks:
      - yimo-network

volumes:
  mysql_data:
    name: yimo-mysql-data
  model_cache:
    name: yimo-model-cache

networks:
  yimo-network:
    name: yimo-network
    driver: bridge
