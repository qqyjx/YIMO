services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: twin-fusion-backend
    environment:
      PROFILE: prod
      DM_HOST: ${DM_HOST:?must set}
      DM_PORT: ${DM_PORT:-5236}
      DM_SCHEMA: ${DM_SCHEMA:-TWIN_FUSION}
      DM_USER: ${DM_USER:?must set}
      DM_PASSWORD: ${DM_PASSWORD:?must set}
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    restart: unless-stopped
    volumes:
      - ../../DATA:/data:ro
      - ../../outputs:/outputs:ro
    # 研发环境 32C/64G, 后端/前端/算法三个容器分配, 后端占 8C/8G
    deploy:
      resources:
        limits: { cpus: "8", memory: 8G }
        reservations: { cpus: "2", memory: 2G }
    networks: [twin-net]

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    container_name: twin-fusion-frontend
    ports:
      - "80:80"
    depends_on: [backend]
    restart: unless-stopped
    networks: [twin-net]

  algo:
    build:
      context: ../..
      dockerfile: platform/algo/Dockerfile
    container_name: twin-fusion-algo
    environment:
      SBERT_MODEL_NAME: shibing624/text2vec-base-chinese
      DEEPSEEK_API_BASE: ${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?must set}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      TZ: Asia/Shanghai
    volumes:
      - ../../scripts:/app/scripts:ro
      - ../../DATA:/data:ro
      - ../../outputs:/outputs
    ports:
      - "9000:9000"
    deploy:
      resources:
        limits: { cpus: "8", memory: 4G }
        reservations: { cpus: "2", memory: 2G }
    restart: unless-stopped
    networks: [twin-net]

networks:
  twin-net:
    driver: bridge
