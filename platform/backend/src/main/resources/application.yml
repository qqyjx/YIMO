server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: twin-fusion-platform
  profiles:
    active: ${PROFILE:local}
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Knife4j / OpenAPI
knife4j:
  enable: true
  openapi:
    title: 支撑孪生体新范式多维数据融合分析框架原型系统 API
    version: 0.1.0
    description: 部署版后端 REST 接口
    concat: twin-fusion-team
