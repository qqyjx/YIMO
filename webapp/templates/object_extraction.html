<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一模到底本体管理 - DataMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #3b82f6;
            --accent: #22c55e;
            --concept-color: #6366f1;
            --logical-color: #22c55e;
            --physical-color: #f59e0b;
            --object-color: #3b82f6;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --radius: 12px;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-body);
            min-height: 100vh;
            color: var(--text-main);
        }

        .page-header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title i { color: var(--primary); }

        /* 三层架构图例 */
        .layer-legend {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .legend-item { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; color: var(--text-muted); }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; }
        .legend-dot.concept { background: var(--concept-color); }
        .legend-dot.logical { background: var(--logical-color); }

        /* 对象卡片 */
        .object-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            cursor: pointer;
            height: 100%;
        }
        .object-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 8px 24px rgba(99,102,241,0.15);
        }
        .object-card.active {
            border-color: var(--primary);
            background: #eef2ff;
        }

        .object-icon {
            width: 48px; height: 48px; border-radius: var(--radius);
            background: linear-gradient(135deg, var(--object-color), var(--primary));
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; margin-bottom: 1rem;
        }
        .object-name { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
        .object-code { font-size: 0.75rem; color: var(--text-muted); font-family: monospace; }

        .object-stats { display: flex; gap: 0.5rem; margin-top: 1rem; }
        .stat-badge {
            padding: 0.25rem 0.5rem; border-radius: 6px; font-size: 0.75rem;
            display: flex; align-items: center; gap: 0.25rem;
        }
        .stat-badge.concept { background: #e0e7ff; color: #4f46e5; }
        .stat-badge.logical { background: #dcfce7; color: #16a34a; }

        /* 关联关系面板 */
        .relation-panel {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            border: 1px solid var(--border);
            margin-top: 2rem;
            box-shadow: var(--shadow);
        }
        .relation-panel h4 { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }

        /* 层级关系可视化 */
        .concept-group {
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        .concept-header {
            padding: 0.75rem 1rem;
            background: #f1f5f9;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
        }
        .concept-header:hover { background: #e2e8f0; }
        .concept-header .concept-name {
            font-weight: 600;
            color: var(--primary);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .concept-header .logical-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            background: #e0e7ff;
            padding: 0.15rem 0.6rem;
            border-radius: 10px;
        }
        .logical-list {
            padding: 0.75rem 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            border-top: 1px solid var(--border);
        }

        .entity-tag {
            padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.8rem;
            background: #f1f5f9; border: 1px solid var(--border); transition: all 0.2s;
        }
        .entity-tag:hover { background: #e2e8f0; }
        .entity-tag.concept:hover { border-color: var(--concept-color); }
        .entity-tag.logical:hover { border-color: var(--logical-color); }

        .entity-strength {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 0.25rem;
        }
        .strength-high { background: #22c55e; }
        .strength-medium { background: #f59e0b; }
        .strength-low { background: #94a3b8; }

        /* 桑基图容器 */
        .sankey-container {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            border: 1px solid var(--border);
            margin-top: 2rem;
            min-height: 400px;
            box-shadow: var(--shadow);
        }
        #sankey-chart { width: 100%; height: 500px; }

        /* 统计卡片 */
        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 1rem; margin-bottom: 2rem;
        }
        .stats-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.25rem;
            border: 1px solid var(--border);
            text-align: center;
        }
        .stats-value {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .stats-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }

        /* 操作按钮 */
        .action-buttons { display: flex; gap: 1rem; margin-bottom: 2rem; }
        .btn-action {
            padding: 0.75rem 1.5rem; border-radius: 10px; border: none;
            font-weight: 500; display: flex; align-items: center; gap: 0.5rem;
            transition: all 0.3s; cursor: pointer;
        }
        .btn-primary-custom { background: var(--primary); color: white; }
        .btn-primary-custom:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(99,102,241,0.3); }
        .btn-secondary-custom { background: white; color: var(--text-main); border: 1px solid var(--border); }
        .btn-secondary-custom:hover { background: #f1f5f9; }

        .domain-selector {
            background: #f1f5f9 !important;
            border: 1px solid var(--border);
        }
        .domain-selector span { color: var(--text-muted) !important; }
        .domain-selector label { color: var(--text-main) !important; }
        .domain-selector .badge-count {
            background: #e0e7ff !important; color: #4f46e5 !important;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .stats-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <header class="page-header">
        <div class="container-fluid px-4">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="page-title">
                    <i class="bi bi-diagram-3"></i>
                    一模到底本体管理
                </h1>
                <div class="d-flex align-items-center gap-3">
                    <div class="domain-selector d-flex align-items-center gap-2" style="padding:0.5rem 1rem; border-radius:8px;">
                        <span style="font-size:0.9rem; color:#94a3b8;">数据域：</span>
                        <div id="domainCheckboxes" class="d-flex gap-3 flex-wrap">
                            <span style="color:#94a3b8;">加载中...</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-action btn-primary-custom" onclick="runExtraction(event)">
                            <i class="bi bi-play-fill"></i> 执行抽取
                        </button>
                        <button class="btn-action btn-secondary-custom" onclick="exportResults()">
                            <i class="bi bi-download"></i> 导出结果
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid px-4">
        <!-- 架构图例 -->
        <div class="layer-legend">
            <div class="legend-item">
                <span class="legend-dot concept"></span>
                <span>概念实体（直接关联）</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot logical"></span>
                <span>逻辑实体（间接关联）</span>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stats-card">
                <div class="stats-value" id="stat-objects">0</div>
                <div class="stats-label">抽取对象数</div>
            </div>
            <div class="stats-card">
                <div class="stats-value" id="stat-concept">0</div>
                <div class="stats-label">概念实体（直接关联）</div>
            </div>
            <div class="stats-card">
                <div class="stats-value" id="stat-logical">0</div>
                <div class="stats-label">逻辑实体（间接关联）</div>
            </div>
        </div>

        <!-- 对象卡片网格 -->
        <h4 class="mb-3"><i class="bi bi-box-seam"></i> 抽取的核心对象</h4>
        <div class="row g-3 mb-4" id="objects-grid">
            <!-- 动态生成 -->
        </div>

        <!-- 关联关系详情面板 -->
        <div class="relation-panel" id="relation-panel" style="display: none;">
            <h4>
                <i class="bi bi-link-45deg"></i>
                <span id="selected-object-name">-</span> 的关联关系
                <span style="font-size:0.8rem; color:var(--text-muted); font-weight:400; margin-left:0.5rem;">
                    对象 → 概念实体（直接）→ 逻辑实体（间接）
                </span>
            </h4>

            <div id="hierarchical-relations">
                <!-- 动态生成层级关系 -->
            </div>
        </div>

        <!-- 桑基图 -->
        <div class="sankey-container">
            <h4 class="mb-3"><i class="bi bi-bar-chart-line"></i> 对象-三层架构关联桑基图</h4>
            <div id="sankey-chart"></div>
        </div>
    </div>

    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        // 全局 ECharts 实例（避免重复 init 导致内存泄漏）
        let sankeyChart = null;

        // 全局 resize 监听（只注册一次）
        window.addEventListener('resize', () => {
            if (sankeyChart) sankeyChart.resize();
        });

        // 从 API 加载的数据（初始为空）
        let extractedObjects = [];

        // 关联数据（从 API 加载）
        let relationData = {};

        // 当前选中的域
        let currentDomain = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', async function() {
            await loadDomains();
            currentDomain = getSelectedDomains()[0] || '';
            await loadFromAPI();

            // 监听域选择变化
            document.getElementById('domainCheckboxes').addEventListener('change', function(e) {
                if (e.target.classList.contains('domain-checkbox')) {
                    // 单选模式：取消其他选中
                    document.querySelectorAll('.domain-checkbox').forEach(cb => {
                        if (cb !== e.target) cb.checked = false;
                    });
                    currentDomain = e.target.checked ? e.target.value : '';
                    loadFromAPI();
                }
            });
        });

        // 从API加载数据（支持domain过滤）
        async function loadFromAPI() {
            try {
                const domain = currentDomain || getSelectedDomains()[0] || '';
                const url = domain ? `/api/olm/extracted-objects?domain=${domain}` : '/api/olm/extracted-objects';
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data.objects && data.objects.length > 0) {
                        extractedObjects = data.objects.map(obj => ({
                            ...obj,
                            icon: getObjectIcon(obj.object_code),
                            stats: obj.stats || { concept: 0, logical: 0, physical: 0 }
                        }));
                        renderObjectCards();
                        updateStats();
                        initSankeyChart();
                    } else {
                        // 无数据时显示空状态
                        extractedObjects = [];
                        renderObjectCards();
                        updateStats();
                        initSankeyChart();
                    }
                }
            } catch (err) {
                console.warn('API 加载失败，使用本地默认数据:', err);
                // 显示黄色警告提示条
                let banner = document.getElementById('api-warning-banner');
                if (!banner) {
                    banner = document.createElement('div');
                    banner.id = 'api-warning-banner';
                    banner.style.cssText = 'background:#fffbeb; border:1px solid #f59e0b; color:#92400e; padding:0.75rem 1rem; border-radius:8px; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;';
                    banner.innerHTML = '<i class="bi bi-exclamation-triangle"></i> API 连接失败，当前显示的是本地缓存数据';
                    document.querySelector('.container-fluid.px-4')?.prepend(banner);
                }
                // 用本地默认数据渲染
                renderObjectCards();
                updateStats();
                initSankeyChart();
            }
        }

        // 获取对象图标
        function getObjectIcon(code) {
            const icons = {
                'OBJ_PROJECT': 'bi-building',
                'OBJ_DEVICE': 'bi-cpu',
                'OBJ_ASSET': 'bi-safe2',
                'OBJ_CONTRACT': 'bi-file-earmark-text',
                'OBJ_PERSONNEL': 'bi-person',
                'OBJ_ORGANIZATION': 'bi-diagram-2',
                'OBJ_DOCUMENT': 'bi-file-earmark',
                'OBJ_TASK': 'bi-list-check',
                'OBJ_MATERIAL': 'bi-box',
                'OBJ_COST': 'bi-currency-yen',
                'OBJ_PROCESS': 'bi-arrow-repeat'
            };
            return icons[code] || 'bi-box-seam';
        }

        // 渲染对象卡片
        function renderObjectCards() {
            const grid = document.getElementById('objects-grid');
            grid.innerHTML = extractedObjects.map(obj => `
                <div class="col-md-3 col-sm-6">
                    <div class="object-card" data-code="${obj.object_code}" onclick="selectObject('${obj.object_code}')">
                        <div class="object-icon">
                            <i class="${obj.icon || 'bi-box-seam'}"></i>
                        </div>
                        <div class="object-name">${obj.object_name}</div>
                        <div class="object-code">${obj.object_code}</div>
                        <p class="small mt-2 mb-2" style="color:var(--text-muted);">${obj.description || ''}</p>
                        <div class="object-stats">
                            <span class="stat-badge concept">
                                <i class="bi bi-lightbulb"></i> ${obj.stats?.concept || 0}
                            </span>
                            <span class="stat-badge logical">
                                <i class="bi bi-ui-checks-grid"></i> ${obj.stats?.logical || 0}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('stat-objects').textContent = extractedObjects.length;

            let totalConcept = 0, totalLogical = 0;
            extractedObjects.forEach(obj => {
                totalConcept += obj.stats?.concept || 0;
                totalLogical += obj.stats?.logical || 0;
            });

            document.getElementById('stat-concept').textContent = totalConcept;
            document.getElementById('stat-logical').textContent = totalLogical;
        }

        // 选择对象
        async function selectObject(code) {
            // 更新卡片状态
            document.querySelectorAll('.object-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.code === code) {
                    card.classList.add('active');
                }
            });

            const obj = extractedObjects.find(o => o.object_code === code);
            if (!obj) return;

            document.getElementById('selected-object-name').textContent = obj.object_name;
            document.getElementById('relation-panel').style.display = 'block';

            // 尝试从API获取关联数据（传递domain参数）
            let relations = relationData[code];
            try {
                const domain = currentDomain || '';
                const url = domain ? `/api/olm/object-relations/${code}?domain=${domain}` : `/api/olm/object-relations/${code}`;
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    relations = data;
                }
            } catch (err) {
                console.log('Using default relation data');
            }

            // 渲染层级关联
            renderHierarchicalRelations(relations);

            // 滚动到面板
            document.getElementById('relation-panel').scrollIntoView({ behavior: 'smooth' });
        }

        // 渲染层级关系面板：对象→概念实体→逻辑实体
        function renderHierarchicalRelations(relations) {
            const container = document.getElementById('hierarchical-relations');
            const concepts = relations?.concept || [];
            const logicals = relations?.logical || [];

            if (concepts.length === 0 && logicals.length === 0) {
                container.innerHTML = '<p style="color:var(--text-muted);">暂无关联数据</p>';
                return;
            }

            // 按概念实体分组逻辑实体
            const logicalByConceptMap = {};
            logicals.forEach(le => {
                const via = le.via_concept_entity || '未分组';
                if (!logicalByConceptMap[via]) logicalByConceptMap[via] = [];
                logicalByConceptMap[via].push(le);
            });

            container.innerHTML = concepts.map((ce, idx) => {
                const name = typeof ce === 'string' ? ce : ce.entity_name;
                const logicalCount = ce.logical_count || (logicalByConceptMap[name]?.length || 0);
                const logicalEntities = logicalByConceptMap[name] || [];
                const id = `logical-group-${idx}`;

                return `
                <div class="concept-group">
                    <div class="concept-header" onclick="document.getElementById('${id}').style.display = document.getElementById('${id}').style.display === 'none' ? 'flex' : 'none'">
                        <span class="concept-name">
                            <span class="entity-strength strength-high"></span>
                            <i class="bi bi-lightbulb" style="color:var(--concept-color);"></i>
                            ${name}
                        </span>
                        <span class="logical-count">${logicalCount} 个逻辑实体 <i class="bi bi-chevron-down" style="font-size:0.7rem;"></i></span>
                    </div>
                    <div class="logical-list" id="${id}" style="display:none;">
                        ${logicalEntities.length > 0
                            ? logicalEntities.slice(0, 30).map(le => `
                                <span class="entity-tag logical" title="通过 ${name} 间接关联">
                                    ${typeof le === 'string' ? le : le.entity_name}
                                </span>
                            `).join('') + (logicalEntities.length > 30 ? `<span class="entity-tag" style="color:var(--text-muted);">+${logicalEntities.length - 30} 更多</span>` : '')
                            : '<span style="color:var(--text-muted); font-size:0.85rem;">无逻辑实体</span>'
                        }
                    </div>
                </div>`;
            }).join('');
        }

        // 初始化桑基图（复用全局 sankeyChart 实例）
        // 三列流：对象 → 概念实体层（直接关联）→ 逻辑实体层（间接关联）
        function initSankeyChart() {
            const container = document.getElementById('sankey-chart');

            // 复用已有实例，避免内存泄漏
            if (!sankeyChart) {
                sankeyChart = echarts.init(container);
            }

            // 构建三列桑基图数据
            const nodes = [];
            const links = [];
            let totalLogical = 0;

            // 左列：对象节点
            extractedObjects.forEach(obj => {
                nodes.push({
                    name: obj.object_name,
                    itemStyle: { color: '#3b82f6' }
                });
            });

            // 中列：概念实体层（聚合节点）
            nodes.push({ name: '概念实体层', itemStyle: { color: '#6366f1' } });
            // 右列：逻辑实体层（聚合节点）
            nodes.push({ name: '逻辑实体层', itemStyle: { color: '#22c55e' } });

            // 链接：对象 → 概念实体层（直接关联）
            extractedObjects.forEach(obj => {
                if (obj.stats?.concept > 0) {
                    links.push({
                        source: obj.object_name,
                        target: '概念实体层',
                        value: obj.stats.concept
                    });
                }
                totalLogical += (obj.stats?.logical || 0);
            });

            // 链接：概念实体层 → 逻辑实体层（间接关联汇总）
            if (totalLogical > 0) {
                links.push({
                    source: '概念实体层',
                    target: '逻辑实体层',
                    value: totalLogical
                });
            }

            // 无数据时显示空状态提示
            if (links.length === 0) {
                sankeyChart.clear();
                sankeyChart.setOption({
                    backgroundColor: 'transparent',
                    graphic: {
                        type: 'text',
                        left: 'center',
                        top: 'middle',
                        style: {
                            text: '暂无关联数据\n请先执行对象抽取或检查数据源',
                            fontSize: 16,
                            fill: '#94a3b8',
                            textAlign: 'center'
                        }
                    }
                });
                return;
            }

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    triggerOn: 'mousemove',
                    formatter: function(params) {
                        if (params.dataType === 'edge') {
                            const relType = params.data.source === '概念实体层' ? '间接关联' : '直接关联';
                            return `${params.data.source} → ${params.data.target}<br/>${relType}数量: ${params.data.value}`;
                        }
                        return params.name;
                    }
                },
                series: [{
                    type: 'sankey',
                    layout: 'none',
                    emphasis: {
                        focus: 'adjacency'
                    },
                    nodeAlign: 'justify',
                    data: nodes,
                    links: links,
                    lineStyle: {
                        color: 'gradient',
                        curveness: 0.5
                    },
                    label: {
                        color: '#0f172a',
                        fontSize: 12
                    }
                }]
            };

            sankeyChart.setOption(option, true);
        }

        // 获取选中的域
        function getSelectedDomains() {
            const checkboxes = document.querySelectorAll('.domain-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // 加载域列表
        async function loadDomains() {
            const container = document.getElementById('domainCheckboxes');
            try {
                const resp = await fetch('/api/domains');
                const domains = await resp.json();

                if (domains.length === 0) {
                    container.innerHTML = '<span style="color:#f59e0b;">未发现数据域，请在 DATA/ 目录下创建子文件夹</span>';
                    return;
                }

                container.innerHTML = domains.map((d, i) => `
                    <label class="d-flex align-items-center gap-1" style="cursor:pointer; color:var(--text-main);">
                        <input type="checkbox" class="domain-checkbox" value="${d.code}" ${i === 0 ? 'checked' : ''} style="accent-color:#6366f1;">
                        <span>${d.name}</span>
                        <span style="font-size:0.75rem; background:#e0e7ff; padding:0 6px; border-radius:10px; color:#4f46e5;">${d.files?.length || 0}</span>
                    </label>
                `).join('');

                // 设置默认选中的域
                currentDomain = domains[0]?.code || '';
            } catch(e) {
                console.error('加载域列表失败:', e);
                container.innerHTML = '<span style="color:#f87171;">加载域列表失败</span>';
            }
        }

        // 执行抽取
        async function runExtraction(e) {
            const btn = e.target.closest('button');
            const domains = getSelectedDomains();

            if (domains.length === 0) {
                alert('请至少选择一个数据域');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> 抽取中...';

            try {
                const response = await fetch('/api/olm/run-extraction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ use_llm: true, domains: domains })
                });

                if (response.ok) {
                    const result = await response.json();
                    alert(`抽取完成！\n对象数: ${result.objects_count}\n关联数: ${result.relations_count}`);
                    location.reload();
                } else {
                    throw new Error('抽取失败');
                }
            } catch (err) {
                alert('抽取失败: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-play-fill"></i> 执行抽取';
            }
        }

        // 导出结果（支持domain过滤）
        async function exportResults() {
            try {
                const domain = currentDomain || '';
                const url = domain ? `/api/olm/export-objects?domain=${domain}` : '/api/olm/export-objects';
                const response = await fetch(url);
                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = domain ? `extracted_objects_${domain}.json` : 'extracted_objects_all.json';
                    a.click();
                }
            } catch (err) {
                // 降级：导出本地数据
                const data = JSON.stringify({ objects: extractedObjects, relations: relationData, domain: currentDomain }, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = currentDomain ? `extracted_objects_${currentDomain}.json` : 'extracted_objects.json';
                a.click();
            }
        }
    </script>
</body>
</html>
