<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一模到底本体管理 - DataMind</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --concept-color: #6366f1;
            --logical-color: #22c55e;
            --physical-color: #f59e0b;
            --object-color: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }

        .page-header {
            background: rgba(30, 27, 75, 0.8);
            backdrop-filter: blur(10px);
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title i {
            color: #818cf8;
        }

        /* 三层架构图例 */
        .layer-legend {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-dot.concept { background: var(--concept-color); }
        .legend-dot.logical { background: var(--logical-color); }
        .legend-dot.physical { background: var(--physical-color); }

        /* 对象卡片 */
        .object-card {
            background: rgba(30, 27, 75, 0.6);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            height: 100%;
        }

        .object-card:hover {
            transform: translateY(-4px);
            border-color: var(--object-color);
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
        }

        .object-card.active {
            border-color: var(--object-color);
            background: rgba(59, 130, 246, 0.15);
        }

        .object-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--object-color), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .object-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .object-code {
            font-size: 0.75rem;
            color: #94a3b8;
            font-family: monospace;
        }

        .object-stats {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .stat-badge {
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .stat-badge.concept {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
        }

        .stat-badge.logical {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
        }

        .stat-badge.physical {
            background: rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        /* 关联关系面板 */
        .relation-panel {
            background: rgba(30, 27, 75, 0.6);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            margin-top: 2rem;
        }

        .relation-panel h4 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        /* 三层架构可视化 */
        .layer-visualization {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .layer-row {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .layer-label {
            width: 100px;
            flex-shrink: 0;
            padding: 0.5rem;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .layer-label.concept {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid var(--concept-color);
        }

        .layer-label.logical {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid var(--logical-color);
        }

        .layer-label.physical {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid var(--physical-color);
        }

        .layer-entities {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .entity-tag {
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
        }

        .entity-tag:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .entity-tag.concept:hover { border-color: var(--concept-color); }
        .entity-tag.logical:hover { border-color: var(--logical-color); }
        .entity-tag.physical:hover { border-color: var(--physical-color); }

        .entity-strength {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.25rem;
        }

        .strength-high { background: #22c55e; }
        .strength-medium { background: #f59e0b; }
        .strength-low { background: #94a3b8; }

        /* 桑基图容器 */
        .sankey-container {
            background: rgba(30, 27, 75, 0.6);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            margin-top: 2rem;
            min-height: 400px;
        }

        #sankey-chart {
            width: 100%;
            height: 500px;
        }

        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stats-card {
            background: rgba(30, 27, 75, 0.6);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            text-align: center;
        }

        .stats-value {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #818cf8, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 0.25rem;
        }

        /* 抽取进度 */
        .extraction-progress {
            background: rgba(30, 27, 75, 0.6);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.2);
            margin-bottom: 2rem;
        }

        .progress-bar-custom {
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--concept-color), var(--logical-color), var(--physical-color));
            transition: width 0.5s ease;
        }

        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-action {
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }

        .btn-primary-custom {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
        }

        .btn-primary-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary-custom {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary-custom:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* 连接线动画 */
        .connection-line {
            stroke: var(--object-color);
            stroke-width: 2;
            fill: none;
            stroke-dasharray: 5, 5;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -10; }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
            .layer-row {
                flex-direction: column;
            }
            .layer-label {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <header class="page-header">
        <div class="container-fluid px-4">
            <div class="d-flex justify-content-between align-items-center">
                <h1 class="page-title">
                    <i class="bi bi-diagram-3"></i>
                    一模到底本体管理
                </h1>
                <div class="d-flex align-items-center gap-3">
                    <div class="domain-selector d-flex align-items-center gap-2" style="background:rgba(255,255,255,0.1); padding:0.5rem 1rem; border-radius:8px;">
                        <span style="font-size:0.9rem; color:#94a3b8;">数据域：</span>
                        <div id="domainCheckboxes" class="d-flex gap-3 flex-wrap">
                            <span style="color:#94a3b8;">加载中...</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-action btn-primary-custom" onclick="runExtraction()">
                            <i class="bi bi-play-fill"></i> 执行抽取
                        </button>
                        <button class="btn-action btn-secondary-custom" onclick="exportResults()">
                            <i class="bi bi-download"></i> 导出结果
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="container-fluid px-4">
        <!-- 三层架构图例 -->
        <div class="layer-legend">
            <div class="legend-item">
                <span class="legend-dot concept"></span>
                <span>概念实体（业务场景层）</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot logical"></span>
                <span>逻辑实体（交互表单层）</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot physical"></span>
                <span>物理实体（数据库层）</span>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stats-card">
                <div class="stats-value" id="stat-objects">0</div>
                <div class="stats-label">抽取对象数</div>
            </div>
            <div class="stats-card">
                <div class="stats-value" id="stat-concept">0</div>
                <div class="stats-label">概念实体关联</div>
            </div>
            <div class="stats-card">
                <div class="stats-value" id="stat-logical">0</div>
                <div class="stats-label">逻辑实体关联</div>
            </div>
            <div class="stats-card">
                <div class="stats-value" id="stat-physical">0</div>
                <div class="stats-label">物理实体关联</div>
            </div>
        </div>

        <!-- 对象卡片网格 -->
        <h4 class="mb-3"><i class="bi bi-box-seam"></i> 抽取的核心对象</h4>
        <div class="row g-3 mb-4" id="objects-grid">
            <!-- 动态生成 -->
        </div>

        <!-- 关联关系详情面板 -->
        <div class="relation-panel" id="relation-panel" style="display: none;">
            <h4>
                <i class="bi bi-link-45deg"></i>
                <span id="selected-object-name">-</span> 的三层架构关联
            </h4>

            <div class="layer-visualization">
                <!-- 概念实体层 -->
                <div class="layer-row">
                    <div class="layer-label concept">
                        <i class="bi bi-lightbulb"></i><br>概念实体
                    </div>
                    <div class="layer-entities" id="concept-entities">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 逻辑实体层 -->
                <div class="layer-row">
                    <div class="layer-label logical">
                        <i class="bi bi-ui-checks-grid"></i><br>逻辑实体
                    </div>
                    <div class="layer-entities" id="logical-entities">
                        <!-- 动态生成 -->
                    </div>
                </div>

                <!-- 物理实体层 -->
                <div class="layer-row">
                    <div class="layer-label physical">
                        <i class="bi bi-database"></i><br>物理实体
                    </div>
                    <div class="layer-entities" id="physical-entities">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 桑基图 -->
        <div class="sankey-container">
            <h4 class="mb-3"><i class="bi bi-bar-chart-line"></i> 对象-三层架构关联桑基图</h4>
            <div id="sankey-chart"></div>
        </div>
    </div>

    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        // 模拟数据（实际从API获取）
        let extractedObjects = [
            {
                object_code: 'OBJ_PROJECT',
                object_name: '项目',
                object_name_en: 'Project',
                object_type: 'CORE',
                description: '电网建设项目，包括输变电工程项目、配网工程项目等',
                icon: 'bi-building',
                stats: { concept: 45, logical: 128, physical: 0 }
            },
            {
                object_code: 'OBJ_DEVICE',
                object_name: '设备',
                object_name_en: 'Device',
                object_type: 'CORE',
                description: '电网设备，包括变压器、断路器、线路等',
                icon: 'bi-cpu',
                stats: { concept: 32, logical: 256, physical: 0 }
            },
            {
                object_code: 'OBJ_ASSET',
                object_name: '资产',
                object_name_en: 'Asset',
                object_type: 'CORE',
                description: '固定资产，包括设备资产、房屋资产等',
                icon: 'bi-safe2',
                stats: { concept: 28, logical: 89, physical: 0 }
            },
            {
                object_code: 'OBJ_CONTRACT',
                object_name: '合同',
                object_name_en: 'Contract',
                object_type: 'CORE',
                description: '各类业务合同',
                icon: 'bi-file-earmark-text',
                stats: { concept: 18, logical: 67, physical: 0 }
            },
            {
                object_code: 'OBJ_PERSONNEL',
                object_name: '人员',
                object_name_en: 'Personnel',
                object_type: 'CORE',
                description: '相关人员',
                icon: 'bi-person',
                stats: { concept: 15, logical: 42, physical: 0 }
            },
            {
                object_code: 'OBJ_ORGANIZATION',
                object_name: '组织',
                object_name_en: 'Organization',
                object_type: 'CORE',
                description: '组织机构',
                icon: 'bi-diagram-2',
                stats: { concept: 12, logical: 35, physical: 0 }
            },
            {
                object_code: 'OBJ_DOCUMENT',
                object_name: '文档',
                object_name_en: 'Document',
                object_type: 'AUXILIARY',
                description: '各类业务文档',
                icon: 'bi-file-earmark',
                stats: { concept: 56, logical: 180, physical: 0 }
            },
            {
                object_code: 'OBJ_TASK',
                object_name: '任务',
                object_name_en: 'Task',
                object_type: 'DERIVED',
                description: '工作任务',
                icon: 'bi-list-check',
                stats: { concept: 38, logical: 95, physical: 0 }
            }
        ];

        // 模拟关联数据
        let relationData = {
            'OBJ_PROJECT': {
                concept: ['项目信息', '工程进度信息', '项目验收信息', '可研信息', '初步设计信息'],
                logical: ['项目基本信息表', '项目进度表', '工程量签证', '验收记录表', '可研报告'],
                physical: []
            },
            'OBJ_DEVICE': {
                concept: ['设备信息', '设备台账信息', '设备缺陷信息', '设备检修信息'],
                logical: ['设备台账表', '设备参数表', '设备状态表', '缺陷记录表'],
                physical: []
            },
            'OBJ_ASSET': {
                concept: ['资产信息', '资产价值信息', '折旧信息'],
                logical: ['资产卡片', '资产变动表', '折旧计算表'],
                physical: []
            }
        };

        // 当前选中的域
        let currentDomain = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadDomains();
            // 延迟加载数据，等待域列表加载完成
            setTimeout(() => {
                currentDomain = getSelectedDomains()[0] || '';
                loadFromAPI();
            }, 500);
            renderObjectCards();
            updateStats();
            initSankeyChart();

            // 监听域选择变化
            document.getElementById('domainCheckboxes').addEventListener('change', function(e) {
                if (e.target.classList.contains('domain-checkbox')) {
                    // 单选模式：取消其他选中
                    document.querySelectorAll('.domain-checkbox').forEach(cb => {
                        if (cb !== e.target) cb.checked = false;
                    });
                    currentDomain = e.target.checked ? e.target.value : '';
                    loadFromAPI();
                }
            });
        });

        // 从API加载数据（支持domain过滤）
        async function loadFromAPI() {
            try {
                const domain = currentDomain || getSelectedDomains()[0] || '';
                const url = domain ? `/api/olm/extracted-objects?domain=${domain}` : '/api/olm/extracted-objects';
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data.objects && data.objects.length > 0) {
                        extractedObjects = data.objects.map(obj => ({
                            ...obj,
                            icon: getObjectIcon(obj.object_code),
                            stats: obj.stats || { concept: 0, logical: 0, physical: 0 }
                        }));
                        renderObjectCards();
                        updateStats();
                        initSankeyChart();
                    } else {
                        // 无数据时显示空状态
                        extractedObjects = [];
                        renderObjectCards();
                        updateStats();
                        initSankeyChart();
                    }
                }
            } catch (err) {
                console.log('Using default data');
            }
        }

        // 获取对象图标
        function getObjectIcon(code) {
            const icons = {
                'OBJ_PROJECT': 'bi-building',
                'OBJ_DEVICE': 'bi-cpu',
                'OBJ_ASSET': 'bi-safe2',
                'OBJ_CONTRACT': 'bi-file-earmark-text',
                'OBJ_PERSONNEL': 'bi-person',
                'OBJ_ORGANIZATION': 'bi-diagram-2',
                'OBJ_DOCUMENT': 'bi-file-earmark',
                'OBJ_TASK': 'bi-list-check',
                'OBJ_MATERIAL': 'bi-box',
                'OBJ_COST': 'bi-currency-yen',
                'OBJ_PROCESS': 'bi-arrow-repeat'
            };
            return icons[code] || 'bi-box-seam';
        }

        // 渲染对象卡片
        function renderObjectCards() {
            const grid = document.getElementById('objects-grid');
            grid.innerHTML = extractedObjects.map(obj => `
                <div class="col-md-3 col-sm-6">
                    <div class="object-card" data-code="${obj.object_code}" onclick="selectObject('${obj.object_code}')">
                        <div class="object-icon">
                            <i class="${obj.icon || 'bi-box-seam'}"></i>
                        </div>
                        <div class="object-name">${obj.object_name}</div>
                        <div class="object-code">${obj.object_code}</div>
                        <p class="small text-muted mt-2 mb-2">${obj.description || ''}</p>
                        <div class="object-stats">
                            <span class="stat-badge concept">
                                <i class="bi bi-lightbulb"></i> ${obj.stats?.concept || 0}
                            </span>
                            <span class="stat-badge logical">
                                <i class="bi bi-ui-checks-grid"></i> ${obj.stats?.logical || 0}
                            </span>
                            <span class="stat-badge physical">
                                <i class="bi bi-database"></i> ${obj.stats?.physical || 0}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('stat-objects').textContent = extractedObjects.length;

            let totalConcept = 0, totalLogical = 0, totalPhysical = 0;
            extractedObjects.forEach(obj => {
                totalConcept += obj.stats?.concept || 0;
                totalLogical += obj.stats?.logical || 0;
                totalPhysical += obj.stats?.physical || 0;
            });

            document.getElementById('stat-concept').textContent = totalConcept;
            document.getElementById('stat-logical').textContent = totalLogical;
            document.getElementById('stat-physical').textContent = totalPhysical;
        }

        // 选择对象
        async function selectObject(code) {
            // 更新卡片状态
            document.querySelectorAll('.object-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.code === code) {
                    card.classList.add('active');
                }
            });

            const obj = extractedObjects.find(o => o.object_code === code);
            if (!obj) return;

            document.getElementById('selected-object-name').textContent = obj.object_name;
            document.getElementById('relation-panel').style.display = 'block';

            // 尝试从API获取关联数据（传递domain参数）
            let relations = relationData[code];
            try {
                const domain = currentDomain || '';
                const url = domain ? `/api/olm/object-relations/${code}?domain=${domain}` : `/api/olm/object-relations/${code}`;
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    relations = data;
                }
            } catch (err) {
                console.log('Using default relation data');
            }

            // 渲染关联实体
            renderEntityTags('concept-entities', relations?.concept || [], 'concept');
            renderEntityTags('logical-entities', relations?.logical || [], 'logical');
            renderEntityTags('physical-entities', relations?.physical || [], 'physical');

            // 滚动到面板
            document.getElementById('relation-panel').scrollIntoView({ behavior: 'smooth' });
        }

        // 渲染实体标签
        function renderEntityTags(containerId, entities, layer) {
            const container = document.getElementById(containerId);
            if (entities.length === 0) {
                container.innerHTML = '<span class="text-muted small">暂无关联数据</span>';
                return;
            }

            container.innerHTML = entities.slice(0, 20).map(entity => {
                const name = typeof entity === 'string' ? entity : entity.entity_name;
                const strength = typeof entity === 'object' ? entity.relation_strength : 0.8;
                const strengthClass = strength > 0.7 ? 'strength-high' : strength > 0.4 ? 'strength-medium' : 'strength-low';
                return `
                    <span class="entity-tag ${layer}" title="关联强度: ${(strength * 100).toFixed(0)}%">
                        <span class="entity-strength ${strengthClass}"></span>
                        ${name}
                    </span>
                `;
            }).join('');

            if (entities.length > 20) {
                container.innerHTML += `<span class="entity-tag text-muted">+${entities.length - 20} 更多...</span>`;
            }
        }

        // 初始化桑基图
        function initSankeyChart() {
            const chart = echarts.init(document.getElementById('sankey-chart'));

            // 构建桑基图数据
            const nodes = [];
            const links = [];

            // 添加对象节点
            extractedObjects.forEach(obj => {
                nodes.push({
                    name: obj.object_name,
                    itemStyle: { color: '#3b82f6' }
                });
            });

            // 添加层级标签节点
            nodes.push({ name: '概念实体层', itemStyle: { color: '#6366f1' } });
            nodes.push({ name: '逻辑实体层', itemStyle: { color: '#22c55e' } });
            nodes.push({ name: '物理实体层', itemStyle: { color: '#f59e0b' } });

            // 添加链接
            extractedObjects.forEach(obj => {
                if (obj.stats?.concept > 0) {
                    links.push({
                        source: obj.object_name,
                        target: '概念实体层',
                        value: obj.stats.concept
                    });
                }
                if (obj.stats?.logical > 0) {
                    links.push({
                        source: obj.object_name,
                        target: '逻辑实体层',
                        value: obj.stats.logical
                    });
                }
                if (obj.stats?.physical > 0) {
                    links.push({
                        source: obj.object_name,
                        target: '物理实体层',
                        value: obj.stats.physical
                    });
                }
            });

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'item',
                    triggerOn: 'mousemove',
                    formatter: function(params) {
                        if (params.dataType === 'edge') {
                            return `${params.data.source} → ${params.data.target}<br/>关联数量: ${params.data.value}`;
                        }
                        return params.name;
                    }
                },
                series: [{
                    type: 'sankey',
                    layout: 'none',
                    emphasis: {
                        focus: 'adjacency'
                    },
                    nodeAlign: 'left',
                    data: nodes,
                    links: links,
                    lineStyle: {
                        color: 'gradient',
                        curveness: 0.5
                    },
                    label: {
                        color: '#e2e8f0',
                        fontSize: 12
                    }
                }]
            };

            chart.setOption(option);

            // 响应式
            window.addEventListener('resize', () => chart.resize());
        }

        // 获取选中的域
        function getSelectedDomains() {
            const checkboxes = document.querySelectorAll('.domain-checkbox:checked');
            return Array.from(checkboxes).map(cb => cb.value);
        }

        // 加载域列表
        async function loadDomains() {
            const container = document.getElementById('domainCheckboxes');
            try {
                const resp = await fetch('/api/domains');
                const domains = await resp.json();

                if (domains.length === 0) {
                    container.innerHTML = '<span style="color:#fbbf24;">未发现数据域，请在 DATA/ 目录下创建子文件夹</span>';
                    return;
                }

                container.innerHTML = domains.map((d, i) => `
                    <label class="d-flex align-items-center gap-1" style="cursor:pointer; color:#e2e8f0;">
                        <input type="checkbox" class="domain-checkbox" value="${d.code}" ${i === 0 ? 'checked' : ''} style="accent-color:#6366f1;">
                        <span>${d.name}</span>
                        <span style="font-size:0.75rem; background:rgba(99,102,241,0.3); padding:0 6px; border-radius:10px; color:#a5b4fc;">${d.files?.length || 0}</span>
                    </label>
                `).join('');

                // 设置默认选中的域
                currentDomain = domains[0]?.code || '';
            } catch(e) {
                console.error('加载域列表失败:', e);
                container.innerHTML = '<span style="color:#f87171;">加载域列表失败</span>';
            }
        }

        // 执行抽取
        async function runExtraction() {
            const btn = event.target.closest('button');
            const domains = getSelectedDomains();

            if (domains.length === 0) {
                alert('请至少选择一个数据域');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> 抽取中...';

            try {
                const response = await fetch('/api/olm/run-extraction', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ use_llm: true, domains: domains })
                });

                if (response.ok) {
                    const result = await response.json();
                    alert(`抽取完成！\n对象数: ${result.objects_count}\n关联数: ${result.relations_count}`);
                    location.reload();
                } else {
                    throw new Error('抽取失败');
                }
            } catch (err) {
                alert('抽取失败: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-play-fill"></i> 执行抽取';
            }
        }

        // 导出结果（支持domain过滤）
        async function exportResults() {
            try {
                const domain = currentDomain || '';
                const url = domain ? `/api/olm/export-objects?domain=${domain}` : '/api/olm/export-objects';
                const response = await fetch(url);
                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = domain ? `extracted_objects_${domain}.json` : 'extracted_objects_all.json';
                    a.click();
                }
            } catch (err) {
                // 降级：导出本地数据
                const data = JSON.stringify({ objects: extractedObjects, relations: relationData, domain: currentDomain }, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = currentDomain ? `extracted_objects_${currentDomain}.json` : 'extracted_objects.json';
                a.click();
            }
        }
    </script>
</body>
</html>
