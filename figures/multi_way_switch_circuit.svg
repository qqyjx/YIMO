<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 880" width="1100" height="880">
  <defs>
    <style>
      text { font-family: 'Courier New', monospace; }
      .title { font-size: 20px; font-weight: bold; fill: #222; }
      .subtitle { font-size: 13px; fill: #555; }
      .label { font-size: 12px; fill: #333; }
      .label-sm { font-size: 10px; fill: #666; }
      .wire { stroke: #222; stroke-width: 2; fill: none; }
      .wire-bus { stroke: #222; stroke-width: 3; fill: none; }
      .component { stroke: #222; stroke-width: 1.8; fill: none; }
      .component-fill { stroke: #222; stroke-width: 1.8; fill: #fff; }
      .switch-blade { stroke: #222; stroke-width: 2.2; fill: none; }
      .ground { stroke: #222; stroke-width: 2; fill: none; }
      .dot { fill: #222; }
      .led-on { fill: #4CAF50; stroke: #222; stroke-width: 1.5; }
      .fuse-body { fill: #fff; stroke: #222; stroke-width: 1.5; }
      .border { fill: none; stroke: #999; stroke-width: 1.5; }
      .channel-bg { fill: #f9f9f9; stroke: #ddd; stroke-width: 1; rx: 6; }
    </style>

    <!-- Fuse Symbol -->
    <g id="fuse">
      <rect x="-15" y="-5" width="30" height="10" class="fuse-body"/>
      <line x1="-15" y1="0" x2="-20" y2="0" class="wire"/>
      <line x1="15" y1="0" x2="20" y2="0" class="wire"/>
      <text x="0" y="-10" text-anchor="middle" class="label-sm">FUSE</text>
    </g>

    <!-- SPST Switch (Single-Pole Single-Throw) -->
    <g id="switch-open">
      <circle cx="-12" cy="0" r="3" class="component-fill"/>
      <circle cx="12" cy="0" r="3" class="component-fill"/>
      <line x1="-9" y1="0" x2="10" y2="-10" class="switch-blade"/>
      <line x1="-20" y1="0" x2="-12" y2="0" class="wire"/>
      <line x1="12" y1="0" x2="20" y2="0" class="wire"/>
    </g>

    <!-- Resistor -->
    <g id="resistor">
      <polyline points="-20,0 -15,0 -12,-7 -6,7 0,-7 6,7 12,-7 15,0 20,0" class="component"/>
    </g>

    <!-- LED indicator -->
    <g id="led">
      <polygon points="-6,-6 -6,6 6,0" class="led-on"/>
      <line x1="6" y1="-6" x2="6" y2="6" class="component" stroke-width="2"/>
      <line x1="-12" y1="0" x2="-6" y2="0" class="wire"/>
      <line x1="6" y1="0" x2="12" y2="0" class="wire"/>
      <!-- arrows for light emission -->
      <line x1="1" y1="-8" x2="5" y2="-13" class="component" stroke-width="1"/>
      <line x1="3.5" y1="-12" x2="5" y2="-13" class="component" stroke-width="1"/>
      <line x1="5" y1="-13" x2="4" y2="-10.5" class="component" stroke-width="1"/>
      <line x1="5" y1="-6" x2="9" y2="-11" class="component" stroke-width="1"/>
      <line x1="7.5" y1="-10" x2="9" y2="-11" class="component" stroke-width="1"/>
      <line x1="9" y1="-11" x2="8" y2="-8.5" class="component" stroke-width="1"/>
    </g>

    <!-- Load (rectangle block) -->
    <g id="load">
      <rect x="-15" y="-20" width="30" height="40" class="component-fill"/>
      <line x1="0" y1="-30" x2="0" y2="-20" class="wire"/>
      <line x1="0" y1="20" x2="0" y2="30" class="wire"/>
      <text x="0" y="4" text-anchor="middle" class="label-sm">LOAD</text>
    </g>

    <!-- Ground Symbol -->
    <g id="ground-sym">
      <line x1="0" y1="0" x2="0" y2="8" class="ground"/>
      <line x1="-10" y1="8" x2="10" y2="8" class="ground"/>
      <line x1="-6" y1="12" x2="6" y2="12" class="ground"/>
      <line x1="-3" y1="16" x2="3" y2="16" class="ground"/>
    </g>

    <!-- Battery / Power Source -->
    <g id="power-source">
      <line x1="0" y1="-20" x2="0" y2="-6" class="wire"/>
      <line x1="-12" y1="-6" x2="12" y2="-6" class="component" stroke-width="3"/>
      <line x1="-6" y1="-1" x2="6" y2="-1" class="component" stroke-width="1.2"/>
      <line x1="-12" y1="4" x2="12" y2="4" class="component" stroke-width="3"/>
      <line x1="-6" y1="9" x2="6" y2="9" class="component" stroke-width="1.2"/>
      <line x1="0" y1="9" x2="0" y2="20" class="wire"/>
      <text x="16" y="-4" class="label-sm">+</text>
      <text x="16" y="12" class="label-sm">−</text>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1100" height="880" fill="#ffffff"/>

  <!-- Border -->
  <rect x="10" y="10" width="1080" height="860" class="border"/>

  <!-- Title Block -->
  <rect x="10" y="10" width="1080" height="55" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="550" y="35" text-anchor="middle" class="title">六路独立开关控制电路原理图</text>
  <text x="550" y="52" text-anchor="middle" class="subtitle">Six-Channel Independent Switch Control Circuit Schematic</text>

  <!-- Power Supply Section -->
  <rect x="30" y="80" width="140" height="120" class="channel-bg"/>
  <text x="100" y="98" text-anchor="middle" class="label" font-weight="bold">电源 / Power</text>

  <!-- Power source symbol -->
  <use href="#power-source" x="100" y="140"/>

  <!-- V+ label -->
  <text x="100" y="112" text-anchor="middle" class="label">V+ (DC 24V)</text>

  <!-- Power bus lines -->
  <!-- V+ bus (top horizontal line) -->
  <line x1="100" y1="120" x2="100" y2="100" class="wire"/>
  <circle cx="100" cy="100" r="3" class="dot"/>
  <line x1="100" y1="100" x2="1050" y2="100" class="wire-bus" stroke="#d32f2f"/>
  <text x="1060" y="104" class="label" fill="#d32f2f" font-size="11">V+</text>

  <!-- GND bus (bottom horizontal line) -->
  <line x1="100" y1="160" x2="100" y2="810" class="wire"/>
  <circle cx="100" cy="810" r="3" class="dot"/>
  <line x1="100" y1="810" x2="1050" y2="810" class="wire-bus" stroke="#1565C0"/>
  <text x="1060" y="814" class="label" fill="#1565C0" font-size="11">GND</text>

  <!-- Ground symbol at power source -->
  <use href="#ground-sym" x="100" y="810"/>

  <!-- ============ Channel 1 ============ -->
  <rect x="190" y="80" width="130" height="745" class="channel-bg"/>
  <text x="255" y="98" text-anchor="middle" class="label" font-weight="bold">CH1 / 第1路</text>

  <!-- V+ connection dot -->
  <circle cx="255" cy="100" r="3" class="dot"/>
  <line x1="255" y1="100" x2="255" y2="140" class="wire"/>

  <!-- Fuse -->
  <use href="#fuse" x="255" y="155"/>
  <line x1="255" y1="140" x2="255" y2="155" class="wire"/>
  <text x="255" y="175" text-anchor="middle" class="label-sm">F1 (2A)</text>

  <!-- Wire to switch -->
  <line x1="255" y1="155" x2="255" y2="210" class="wire"/>

  <!-- Switch S1 -->
  <use href="#switch-open" x="255" y="225"/>
  <text x="255" y="250" text-anchor="middle" class="label-sm">S1</text>
  <text x="255" y="262" text-anchor="middle" class="label-sm" fill="#888">ON/OFF</text>

  <!-- Wire to indicator LED branch -->
  <line x1="255" y1="225" x2="255" y2="310" class="wire"/>

  <!-- LED indicator branch -->
  <line x1="255" y1="310" x2="225" y2="310" class="wire"/>
  <circle cx="255" cy="310" r="3" class="dot"/>
  <line x1="225" y1="310" x2="225" y2="340" class="wire"/>

  <!-- LED current limiting resistor -->
  <use href="#resistor" x="225" y="355"/>
  <text x="205" y="350" text-anchor="end" class="label-sm">R1</text>
  <text x="205" y="362" text-anchor="end" class="label-sm">1kΩ</text>
  <line x1="225" y1="355" x2="225" y2="390" class="wire"/>

  <!-- LED -->
  <use href="#led" x="225" y="405"/>
  <text x="205" y="400" text-anchor="end" class="label-sm">D1</text>
  <line x1="225" y1="405" x2="225" y2="440" class="wire"/>
  <line x1="225" y1="440" x2="255" y2="440" class="wire"/>

  <!-- Main load path -->
  <line x1="255" y1="310" x2="255" y2="500" class="wire"/>

  <!-- Load -->
  <use href="#load" x="255" y="560"/>
  <text x="255" y="520" text-anchor="middle" class="label-sm">负载 Load₁</text>
  <line x1="255" y1="500" x2="255" y2="530" class="wire"/>

  <!-- Wire to GND -->
  <line x1="255" y1="590" x2="255" y2="810" class="wire"/>
  <circle cx="255" cy="810" r="3" class="dot"/>

  <!-- Junction from LED branch back -->
  <line x1="255" y1="440" x2="255" y2="500" class="wire" stroke-width="0"/>

  <!-- ============ Channel 2 ============ -->
  <rect x="330" y="80" width="130" height="745" class="channel-bg"/>
  <text x="395" y="98" text-anchor="middle" class="label" font-weight="bold">CH2 / 第2路</text>

  <circle cx="395" cy="100" r="3" class="dot"/>
  <line x1="395" y1="100" x2="395" y2="140" class="wire"/>

  <use href="#fuse" x="395" y="155"/>
  <line x1="395" y1="140" x2="395" y2="155" class="wire"/>
  <text x="395" y="175" text-anchor="middle" class="label-sm">F2 (2A)</text>

  <line x1="395" y1="155" x2="395" y2="210" class="wire"/>

  <use href="#switch-open" x="395" y="225"/>
  <text x="395" y="250" text-anchor="middle" class="label-sm">S2</text>
  <text x="395" y="262" text-anchor="middle" class="label-sm" fill="#888">ON/OFF</text>

  <line x1="395" y1="225" x2="395" y2="310" class="wire"/>

  <line x1="395" y1="310" x2="365" y2="310" class="wire"/>
  <circle cx="395" cy="310" r="3" class="dot"/>
  <line x1="365" y1="310" x2="365" y2="340" class="wire"/>

  <use href="#resistor" x="365" y="355"/>
  <text x="345" y="350" text-anchor="end" class="label-sm">R2</text>
  <text x="345" y="362" text-anchor="end" class="label-sm">1kΩ</text>
  <line x1="365" y1="355" x2="365" y2="390" class="wire"/>

  <use href="#led" x="365" y="405"/>
  <text x="345" y="400" text-anchor="end" class="label-sm">D2</text>
  <line x1="365" y1="405" x2="365" y2="440" class="wire"/>
  <line x1="365" y1="440" x2="395" y2="440" class="wire"/>

  <line x1="395" y1="310" x2="395" y2="500" class="wire"/>

  <use href="#load" x="395" y="560"/>
  <text x="395" y="520" text-anchor="middle" class="label-sm">负载 Load₂</text>
  <line x1="395" y1="500" x2="395" y2="530" class="wire"/>

  <line x1="395" y1="590" x2="395" y2="810" class="wire"/>
  <circle cx="395" cy="810" r="3" class="dot"/>

  <!-- ============ Channel 3 ============ -->
  <rect x="470" y="80" width="130" height="745" class="channel-bg"/>
  <text x="535" y="98" text-anchor="middle" class="label" font-weight="bold">CH3 / 第3路</text>

  <circle cx="535" cy="100" r="3" class="dot"/>
  <line x1="535" y1="100" x2="535" y2="140" class="wire"/>

  <use href="#fuse" x="535" y="155"/>
  <line x1="535" y1="140" x2="535" y2="155" class="wire"/>
  <text x="535" y="175" text-anchor="middle" class="label-sm">F3 (2A)</text>

  <line x1="535" y1="155" x2="535" y2="210" class="wire"/>

  <use href="#switch-open" x="535" y="225"/>
  <text x="535" y="250" text-anchor="middle" class="label-sm">S3</text>
  <text x="535" y="262" text-anchor="middle" class="label-sm" fill="#888">ON/OFF</text>

  <line x1="535" y1="225" x2="535" y2="310" class="wire"/>

  <line x1="535" y1="310" x2="505" y2="310" class="wire"/>
  <circle cx="535" cy="310" r="3" class="dot"/>
  <line x1="505" y1="310" x2="505" y2="340" class="wire"/>

  <use href="#resistor" x="505" y="355"/>
  <text x="485" y="350" text-anchor="end" class="label-sm">R3</text>
  <text x="485" y="362" text-anchor="end" class="label-sm">1kΩ</text>
  <line x1="505" y1="355" x2="505" y2="390" class="wire"/>

  <use href="#led" x="505" y="405"/>
  <text x="485" y="400" text-anchor="end" class="label-sm">D3</text>
  <line x1="505" y1="405" x2="505" y2="440" class="wire"/>
  <line x1="505" y1="440" x2="535" y2="440" class="wire"/>

  <line x1="535" y1="310" x2="535" y2="500" class="wire"/>

  <use href="#load" x="535" y="560"/>
  <text x="535" y="520" text-anchor="middle" class="label-sm">负载 Load₃</text>
  <line x1="535" y1="500" x2="535" y2="530" class="wire"/>

  <line x1="535" y1="590" x2="535" y2="810" class="wire"/>
  <circle cx="535" cy="810" r="3" class="dot"/>

  <!-- ============ Channel 4 ============ -->
  <rect x="610" y="80" width="130" height="745" class="channel-bg"/>
  <text x="675" y="98" text-anchor="middle" class="label" font-weight="bold">CH4 / 第4路</text>

  <circle cx="675" cy="100" r="3" class="dot"/>
  <line x1="675" y1="100" x2="675" y2="140" class="wire"/>

  <use href="#fuse" x="675" y="155"/>
  <line x1="675" y1="140" x2="675" y2="155" class="wire"/>
  <text x="675" y="175" text-anchor="middle" class="label-sm">F4 (2A)</text>

  <line x1="675" y1="155" x2="675" y2="210" class="wire"/>

  <use href="#switch-open" x="675" y="225"/>
  <text x="675" y="250" text-anchor="middle" class="label-sm">S4</text>
  <text x="675" y="262" text-anchor="middle" class="label-sm" fill="#888">ON/OFF</text>

  <line x1="675" y1="225" x2="675" y2="310" class="wire"/>

  <line x1="675" y1="310" x2="645" y2="310" class="wire"/>
  <circle cx="675" cy="310" r="3" class="dot"/>
  <line x1="645" y1="310" x2="645" y2="340" class="wire"/>

  <use href="#resistor" x="645" y="355"/>
  <text x="625" y="350" text-anchor="end" class="label-sm">R4</text>
  <text x="625" y="362" text-anchor="end" class="label-sm">1kΩ</text>
  <line x1="645" y1="355" x2="645" y2="390" class="wire"/>

  <use href="#led" x="645" y="405"/>
  <text x="625" y="400" text-anchor="end" class="label-sm">D4</text>
  <line x1="645" y1="405" x2="645" y2="440" class="wire"/>
  <line x1="645" y1="440" x2="675" y2="440" class="wire"/>

  <line x1="675" y1="310" x2="675" y2="500" class="wire"/>

  <use href="#load" x="675" y="560"/>
  <text x="675" y="520" text-anchor="middle" class="label-sm">负载 Load₄</text>
  <line x1="675" y1="500" x2="675" y2="530" class="wire"/>

  <line x1="675" y1="590" x2="675" y2="810" class="wire"/>
  <circle cx="675" cy="810" r="3" class="dot"/>

  <!-- ============ Channel 5 ============ -->
  <rect x="750" y="80" width="130" height="745" class="channel-bg"/>
  <text x="815" y="98" text-anchor="middle" class="label" font-weight="bold">CH5 / 第5路</text>

  <circle cx="815" cy="100" r="3" class="dot"/>
  <line x1="815" y1="100" x2="815" y2="140" class="wire"/>

  <use href="#fuse" x="815" y="155"/>
  <line x1="815" y1="140" x2="815" y2="155" class="wire"/>
  <text x="815" y="175" text-anchor="middle" class="label-sm">F5 (2A)</text>

  <line x1="815" y1="155" x2="815" y2="210" class="wire"/>

  <use href="#switch-open" x="815" y="225"/>
  <text x="815" y="250" text-anchor="middle" class="label-sm">S5</text>
  <text x="815" y="262" text-anchor="middle" class="label-sm" fill="#888">ON/OFF</text>

  <line x1="815" y1="225" x2="815" y2="310" class="wire"/>

  <line x1="815" y1="310" x2="785" y2="310" class="wire"/>
  <circle cx="815" cy="310" r="3" class="dot"/>
  <line x1="785" y1="310" x2="785" y2="340" class="wire"/>

  <use href="#resistor" x="785" y="355"/>
  <text x="765" y="350" text-anchor="end" class="label-sm">R5</text>
  <text x="765" y="362" text-anchor="end" class="label-sm">1kΩ</text>
  <line x1="785" y1="355" x2="785" y2="390" class="wire"/>

  <use href="#led" x="785" y="405"/>
  <text x="765" y="400" text-anchor="end" class="label-sm">D5</text>
  <line x1="785" y1="405" x2="785" y2="440" class="wire"/>
  <line x1="785" y1="440" x2="815" y2="440" class="wire"/>

  <line x1="815" y1="310" x2="815" y2="500" class="wire"/>

  <use href="#load" x="815" y="560"/>
  <text x="815" y="520" text-anchor="middle" class="label-sm">负载 Load₅</text>
  <line x1="815" y1="500" x2="815" y2="530" class="wire"/>

  <line x1="815" y1="590" x2="815" y2="810" class="wire"/>
  <circle cx="815" cy="810" r="3" class="dot"/>

  <!-- ============ Channel 6 ============ -->
  <rect x="890" y="80" width="130" height="745" class="channel-bg"/>
  <text x="955" y="98" text-anchor="middle" class="label" font-weight="bold">CH6 / 第6路</text>

  <circle cx="955" cy="100" r="3" class="dot"/>
  <line x1="955" y1="100" x2="955" y2="140" class="wire"/>

  <use href="#fuse" x="955" y="155"/>
  <line x1="955" y1="140" x2="955" y2="155" class="wire"/>
  <text x="955" y="175" text-anchor="middle" class="label-sm">F6 (2A)</text>

  <line x1="955" y1="155" x2="955" y2="210" class="wire"/>

  <use href="#switch-open" x="955" y="225"/>
  <text x="955" y="250" text-anchor="middle" class="label-sm">S6</text>
  <text x="955" y="262" text-anchor="middle" class="label-sm" fill="#888">ON/OFF</text>

  <line x1="955" y1="225" x2="955" y2="310" class="wire"/>

  <line x1="955" y1="310" x2="925" y2="310" class="wire"/>
  <circle cx="955" cy="310" r="3" class="dot"/>
  <line x1="925" y1="310" x2="925" y2="340" class="wire"/>

  <use href="#resistor" x="925" y="355"/>
  <text x="905" y="350" text-anchor="end" class="label-sm">R6</text>
  <text x="905" y="362" text-anchor="end" class="label-sm">1kΩ</text>
  <line x1="925" y1="355" x2="925" y2="390" class="wire"/>

  <use href="#led" x="925" y="405"/>
  <text x="905" y="400" text-anchor="end" class="label-sm">D6</text>
  <line x1="925" y1="405" x2="925" y2="440" class="wire"/>
  <line x1="925" y1="440" x2="955" y2="440" class="wire"/>

  <line x1="955" y1="310" x2="955" y2="500" class="wire"/>

  <use href="#load" x="955" y="560"/>
  <text x="955" y="520" text-anchor="middle" class="label-sm">负载 Load₆</text>
  <line x1="955" y1="500" x2="955" y2="530" class="wire"/>

  <line x1="955" y1="590" x2="955" y2="810" class="wire"/>
  <circle cx="955" cy="810" r="3" class="dot"/>

  <!-- ============ Legend / Notes ============ -->
  <rect x="30" y="630" width="140" height="195" class="channel-bg"/>
  <text x="100" y="650" text-anchor="middle" class="label" font-weight="bold">元件说明</text>

  <!-- Legend: Switch -->
  <use href="#switch-open" x="70" y="675" transform="scale(0.8) translate(17.5, 169)"/>
  <text x="110" y="680" class="label-sm">SPST开关</text>

  <!-- Legend: Fuse -->
  <use href="#fuse" x="70" y="700" transform="scale(0.8) translate(17.5, 175)"/>
  <text x="110" y="705" class="label-sm">保险丝</text>

  <!-- Legend: Resistor -->
  <use href="#resistor" x="70" y="725" transform="scale(0.8) translate(17.5, 181)"/>
  <text x="110" y="730" class="label-sm">限流电阻</text>

  <!-- Legend: LED -->
  <use href="#led" x="70" y="750" transform="scale(0.8) translate(17.5, 187.5)"/>
  <text x="110" y="755" class="label-sm">指示灯LED</text>

  <!-- Legend: Load -->
  <rect x="55" y="768" width="20" height="14" class="component-fill"/>
  <text x="65" y="779" text-anchor="middle" class="label-sm">L</text>
  <text x="110" y="779" class="label-sm">负载</text>

  <!-- Legend: Ground -->
  <use href="#ground-sym" x="65" y="790" transform="scale(0.7) translate(28, 282)"/>
  <text x="110" y="800" class="label-sm">接地</text>

  <!-- Notes box -->
  <rect x="30" y="210" width="140" height="400" class="channel-bg"/>
  <text x="100" y="230" text-anchor="middle" class="label" font-weight="bold">电路说明</text>
  <text x="40" y="250" class="label-sm">1. 每路独立控制</text>
  <text x="40" y="268" class="label-sm">   互不影响</text>
  <text x="40" y="290" class="label-sm">2. 每路含保险丝</text>
  <text x="40" y="308" class="label-sm">   过流保护(2A)</text>
  <text x="40" y="330" class="label-sm">3. LED指示灯显示</text>
  <text x="40" y="348" class="label-sm">   各路通断状态</text>
  <text x="40" y="370" class="label-sm">4. 限流电阻保护</text>
